version: '3.8'

services:
  medipharma:
    build: .
    container_name: medipharma
    ports:
      - "8000:8000"   # FastAPI backend
      - "8095:8095"   # Streamlit frontend
    environment:
      - PYTHONPATH=/app
      - MEDIPHEMA_ENV=production
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
